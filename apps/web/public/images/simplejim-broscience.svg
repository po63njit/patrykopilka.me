<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SimpleJim BroScience card art</title>
  <desc id="desc">Gym-themed artwork with slogan: BroScience 50% Fact 50% Magic 100% Results.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0d12"/>
      <stop offset="1" stop-color="#202a36"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <rect x="70" y="80" width="460" height="470" rx="22" fill="#111722" stroke="#364155" stroke-width="3"/>
  <rect x="115" y="315" width="370" height="12" rx="6" fill="#8fa9c7" opacity="0.45"/>
  <rect x="95" y="275" width="18" height="90" fill="#8fa9c7" opacity="0.45"/>
  <rect x="487" y="275" width="18" height="90" fill="#8fa9c7" opacity="0.45"/>
  <rect x="80" y="255" width="40" height="128" rx="6" fill="#6f829d" opacity="0.6"/>
  <rect x="480" y="255" width="40" height="128" rx="6" fill="#6f829d" opacity="0.6"/>

  <g fill="#d8dee9" filter="url(#shadow)">
    <circle cx="305" cy="185" r="42"/>
    <rect x="286" y="230" width="38" height="110" rx="16"/>
    <rect x="246" y="250" width="28" height="84" rx="14" transform="rotate(18 246 250)"/>
    <rect x="336" y="250" width="28" height="84" rx="14" transform="rotate(-18 336 250)"/>
    <rect x="258" y="338" width="30" height="132" rx="14" transform="rotate(10 258 338)"/>
    <rect x="322" y="338" width="30" height="132" rx="14" transform="rotate(-10 322 338)"/>
  </g>

  <text x="585" y="120" fill="#8fd3ff" font-size="52" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">SimpleJim</text>
  <text x="585" y="168" fill="#d3e8ff" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif">Gym tracking, but make it bro-science.</text>

  <text x="585" y="290" fill="#ffffff" font-size="78" font-weight="800" letter-spacing="1" font-family="Impact, Anton, Arial Black, sans-serif">BROSCIENCE</text>
  <text x="585" y="362" fill="#ffffff" font-size="62" font-weight="800" font-family="Impact, Anton, Arial Black, sans-serif">50% FACT</text>
  <text x="585" y="434" fill="#ffffff" font-size="62" font-weight="800" font-family="Impact, Anton, Arial Black, sans-serif">50% MAGIC</text>
  <text x="585" y="536" fill="#d2f4ff" font-size="84" font-weight="900" font-family="Impact, Anton, Arial Black, sans-serif">100% RESULTS</text>
</svg>
